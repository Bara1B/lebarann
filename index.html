<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ucapan Idul Fitri 1447 H untuk Luthfiana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-left" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-right" aria-hidden="true"></div>

  <main class="card-wrap">
    <section id="envelope-scene" class="envelope-scene" aria-label="Amplop ucapan">
      <div class="envelope" aria-hidden="true">
        <div class="envelope-back"></div>
        <div class="letter">
          <p>Untuk Luthfiana</p>
          <span>Eid 1447 H</span>
        </div>
        <div class="envelope-front"></div>
        <div class="envelope-flap"></div>
      </div>
      <button id="open-envelope-btn" type="button">Buka Amplop</button>
    </section>

    <section id="greeting-card" class="greeting-card is-hidden" aria-label="Kartu ucapan selamat hari raya Idul Fitri" aria-hidden="true">
      <p class="badge">Eid Mubarak 1447 H</p>
      <h1>Selamat Hari Raya Idul Fitri</h1>
      <h2>Untuk Luthfiana, Cintaku</h2>

      <p id="typed-message" class="message"></p>

      <div class="actions">
        <button id="replay-btn" type="button">Putar Ulang Ucapan</button>
        <button id="sparkle-btn" type="button">Kirim Doa Lagi</button>
      </div>

      <p class="signature">Dengan cinta, selalu untukmu.</p>
    </section>
  </main>

  <div id="sparkle-layer" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
